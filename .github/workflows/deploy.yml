name: Deploy

on:
  push:
    branches: [master, main]

# Necessário para push no GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  # ── 1. Testes ──────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: whatsapp_tools_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @repo/database db:generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/whatsapp_tools_test?schema=public
        run: pnpm --filter @repo/database exec prisma migrate deploy

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/whatsapp_tools_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
        run: pnpm --filter @repo/api test

  # ── 2. Build e Push das imagens para GHCR ─────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Converter nome do repositório para lowercase
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Configurar Docker Buildx (build multi-layer com cache)
        uses: docker/setup-buildx-action@v3

      - name: Build e push — API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/api:latest
            ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build e push — Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://sistemazapchat.com
            NEXT_PUBLIC_WS_URL=https://sistemazapchat.com
            NEXT_PUBLIC_APP_NAME=SistemaZapChat
            NEXT_PUBLIC_APP_URL=https://sistemazapchat.com
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/web:latest
            ghcr.io/${{ steps.repo.outputs.name }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── 3. Deploy no servidor (só pull — sem build) ───────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 137.184.68.84
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/whatsapp-tools

            echo "▶ Atualizando docker-compose e configs..."
            git pull origin master

            echo "▶ Login no registry..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "▶ Pulling imagens atualizadas (sem build no servidor)..."
            docker compose -f docker-compose.prod.yml pull api web

            echo "▶ Reiniciando serviços de aplicação..."
            docker compose -f docker-compose.prod.yml up -d --no-build api web

            echo "▶ Rodando migrations..."
            docker compose -f docker-compose.prod.yml exec -T api pnpm --filter @repo/database db:migrate:deploy

            echo "▶ Limpando imagens antigas..."
            docker image prune -f

            echo "✓ Deploy concluído!"
