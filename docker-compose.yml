version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: wt-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    depends_on:
      - postgres
      - redis
    networks:
      - wt-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: wt-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.local
    depends_on:
      - api
    networks:
      - wt-network

  evolution:
    image: atendai/evolution-api:latest
    container_name: wt-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      AUTHENTICATION_API_KEY: changeme-evolution-key
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
    depends_on:
      - postgres
      - redis
    networks:
      - wt-network

  postgres:
    image: postgres:16-alpine
    container_name: wt-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_tools
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wt-network

  redis:
    image: redis:7-alpine
    container_name: wt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - wt-network

networks:
  wt-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
