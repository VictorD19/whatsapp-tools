# ─────────────────────────────────────────────────────────
# docker-compose.yml — DESENVOLVIMENTO (hot reload)
# Funciona em Linux, macOS e Windows sem alterações.
# Para produção use: docker compose -f docker-compose.prod.yml up
# ─────────────────────────────────────────────────────────

services:
  # ── Backend NestJS (dev + hot reload) ──────────────
  api:
    build:
      context: ./infra/docker
      dockerfile: Dockerfile.dev
    container_name: wt-api
    working_dir: /app
    command: sh -c "pnpm --filter @repo/database db:generate && pnpm --filter @repo/api dev"
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - api_root_modules:/app/node_modules
      - api_app_modules:/app/apps/api/node_modules
      - api_db_modules:/app/packages/database/node_modules
      - api_types_modules:/app/packages/types/node_modules
      - api_utils_modules:/app/packages/utils/node_modules
    environment:
      NODE_ENV: development
      PORT: 3001
      APP_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whatsapp_tools?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-changeme-evolution-key}
      WEBHOOK_URL: http://api:3001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wt-network

  # ── Frontend Next.js (dev + hot reload) ────────────
  web:
    build:
      context: ./infra/docker
      dockerfile: Dockerfile.dev
    container_name: wt-web
    working_dir: /app
    command: pnpm --filter @repo/web dev
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - .:/app
      - web_root_modules:/app/node_modules
      - web_app_modules:/app/apps/web/node_modules
      - web_db_modules:/app/packages/database/node_modules
      - web_types_modules:/app/packages/types/node_modules
      - web_utils_modules:/app/packages/utils/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      NEXT_PUBLIC_APP_NAME: "WhatsApp Tools"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # ── Cross-OS file watching (fix para Windows/macOS) ──
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    networks:
      - wt-network

  # ── Evolution API (WhatsApp) ───────────────────────
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: wt-evolution
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      SERVER_URL: http://evolution:8080
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme-evolution-key}
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1033994345"
      LANGUAGE: pt-BR
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wt-network

  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wt-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_tools
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-evolution-db.sql:/docker-entrypoint-initdb.d/init-evolution-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wt-network

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wt-network

networks:
  wt-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  # ── Volumes separados por serviço (evita conflito entre api e web) ──
  api_root_modules:
  api_app_modules:
  api_db_modules:
  api_types_modules:
  api_utils_modules:
  web_root_modules:
  web_app_modules:
  web_db_modules:
  web_types_modules:
  web_utils_modules:
