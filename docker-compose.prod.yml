services:
  # ── Backend NestJS ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      network: host
    container_name: wt-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      APP_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whatsapp_tools?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-changeme-evolution-key}
      WEBHOOK_URL: http://api:3001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wt-network

  # ── Frontend Next.js ───────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_WS_URL: http://localhost:3001
        NEXT_PUBLIC_APP_NAME: "WhatsApp Tools"
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    container_name: wt-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      NEXT_PUBLIC_APP_NAME: "WhatsApp Tools"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - api
    networks:
      - wt-network

  # ── Evolution API (WhatsApp) ───────────────────────
  evolution:
    image: atendai/evolution-api:latest
    container_name: wt-evolution
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      SERVER_URL: http://evolution:8080
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme-evolution-key}
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1023394088"
      LANGUAGE: pt-BR
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wt-network

  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wt-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_tools
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-evolution-db.sql:/docker-entrypoint-initdb.d/init-evolution-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wt-network

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wt-network

networks:
  wt-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
